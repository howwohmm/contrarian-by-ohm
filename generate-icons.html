<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contrarian — Icon Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1612;
      color: #f5f0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 2.5rem; padding: 2rem;
    }
    h1 { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase; color: #4a3f35; }
    .previews { display: flex; align-items: flex-end; gap: 3rem; }
    .preview { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    canvas { border-radius: 22.5%; box-shadow: 0 0 0 1px #2a2018; }
    .label { font-size: 0.6rem; color: #4a3f35; letter-spacing: 0.1em; }
    .btn {
      background: none; border: 1px solid #3a3028; color: #8b7a6a;
      font-family: inherit; font-size: 0.8rem; letter-spacing: 0.04em;
      padding: 0.65rem 2rem; border-radius: 6px; cursor: pointer;
      transition: color 150ms, border-color 150ms;
    }
    .btn:hover { color: #f5f0e8; border-color: #6a5a4a; }
    .note { font-size: 0.62rem; color: #3a3028; letter-spacing: 0.06em; text-align: center; line-height: 1.8; }
  </style>
</head>
<body>

  <h1>Contrarian — icon generator</h1>

  <div class="previews">
    <div class="preview">
      <canvas id="c128" width="128" height="128"></canvas>
      <span class="label">128 × 128</span>
    </div>
    <div class="preview">
      <canvas id="c48" width="48" height="48"></canvas>
      <span class="label">48 × 48</span>
    </div>
    <div class="preview">
      <canvas id="c16" width="16" height="16"></canvas>
      <span class="label">16 × 16</span>
    </div>
  </div>

  <button class="btn" onclick="downloadAll()">↓ download all three icons</button>

  <p class="note">
    saves icon16.png · icon48.png · icon128.png<br>
    move them into /contrarian/icons/
  </p>

  <script>
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawIcon(canvas) {
      const s   = canvas.width;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, s, s);

      // Background — warm parchment
      const bg = ctx.createLinearGradient(0, 0, 0, s);
      bg.addColorStop(0, '#f0ebe0');
      bg.addColorStop(1, '#e8e0d0');
      roundRect(ctx, 0, 0, s, s, s * 0.22);
      ctx.fillStyle = bg;
      ctx.fill();

      // Vignette
      const vig = ctx.createRadialGradient(s/2, s/2, s*0.2, s/2, s/2, s*0.72);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(20,12,5,0.18)');
      roundRect(ctx, 0, 0, s, s, s * 0.22);
      ctx.fillStyle = vig;
      ctx.fill();

      // Italic "C" — dark ink
      ctx.fillStyle = '#1a1612';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (s >= 48) {
        ctx.font = `300 italic ${Math.round(s * 0.60)}px 'Cormorant Garamond', Georgia, serif`;
        ctx.fillText('C', s * 0.50, s * 0.51);
      } else {
        // 16px — bolder for legibility
        ctx.font = `400 italic ${Math.round(s * 0.64)}px 'Cormorant Garamond', Georgia, serif`;
        ctx.fillText('C', s * 0.50, s * 0.52);
      }
    }

    // Wait for font
    document.fonts.ready.then(() => {
      ['c128', 'c48', 'c16'].forEach(id => drawIcon(document.getElementById(id)));
    });

    function download(canvas, filename) {
      const a  = document.createElement('a');
      a.download = filename;
      a.href     = canvas.toDataURL('image/png');
      a.click();
    }

    function downloadAll() {
      download(document.getElementById('c128'), 'icon128.png');
      setTimeout(() => download(document.getElementById('c48'),  'icon48.png'),  300);
      setTimeout(() => download(document.getElementById('c16'),  'icon16.png'),  600);
    }
  </script>
</body>
</html>
